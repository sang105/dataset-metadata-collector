name: Deploy to GitHub Pages

on:
  # Runs on every push to main
  push:
    branches: [main]

  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions so the workflow can write to GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # The build output lands in build/client/ because ssr:false
        # tells React Router to skip the server bundle entirely.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # React Router SPA build output with ssr:false
          path: build/client

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4